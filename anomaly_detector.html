<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Performance Anomaly Detector</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f0f2f6;color:#1a1a2e}
#app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* SIDEBAR */
#sidebar{background:#fff;border-right:1px solid #e0e4ea;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.sidebar-logo img{max-width:100%;max-height:60px;object-fit:contain}
.sidebar-divider{border:none;border-top:1px solid #e0e4ea;margin:4px 0}
.sidebar-section-title{font-size:13px;font-weight:700;color:#444;letter-spacing:.3px;margin-bottom:4px}
.sidebar-upload-block{display:flex;flex-direction:column;gap:6px}
.upload-label{font-size:12px;font-weight:600;color:#555}
.upload-caption{font-size:11px;color:#888}
.file-input-wrapper{position:relative}
input[type="file"]{font-size:12px;width:100%;padding:4px;border:1px solid #ccc;border-radius:6px;background:#fafafa;cursor:pointer}
input[type="file"]::file-selector-button{background:#e8eaf0;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
.upload-btn{display:none;width:100%;padding:7px;background:#4a6cf7;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.upload-btn:hover{background:#3a5ce5}
.upload-btn.visible{display:block}
.status-badge{font-size:11px;padding:4px 8px;border-radius:4px;display:none}
.status-badge.success{display:block;background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.status-badge.error{display:block;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
#loaded-files{display:none;background:#f8f9fb;border:1px solid #e0e4ea;border-radius:6px;padding:8px;font-size:11px;color:#555}
#loaded-files ul{margin-top:4px;padding-left:14px}
#loaded-files li{margin-bottom:2px}
.reset-btn{display:none;width:100%;padding:7px;background:#fff;color:#e74c3c;border:1.5px solid #e74c3c;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.reset-btn:hover{background:#fdf0ee}
.reset-btn.visible{display:block}

/* MAIN */
#main{padding:24px 32px;overflow-y:auto}
.breadcrumb{font-size:12px;color:#888;margin-bottom:8px}
.main-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.main-subtitle{font-size:13px;color:#666;margin-bottom:16px}
.nav-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.nav-btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.nav-btn:disabled{opacity:.45;cursor:not-allowed}
.nav-btn-active{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.nav-btn-inactive{background:#fff;color:#444;border-color:#dde1ea}
.nav-btn-inactive:not(:disabled):hover{background:#f0f2f8;border-color:#b0b8d0}
.nav-divider{border:none;border-top:1px solid #e0e4ea;margin-bottom:20px}

/* CARDS */
.welcome-card,.ready-card{background:#fff;border:1px solid #e0e4ea;border-radius:12px;padding:32px;text-align:center;max-width:680px;margin:40px auto}
.welcome-card h3,.ready-card h3{font-size:18px;margin-bottom:8px;color:#1a1a2e}
.welcome-card p,.ready-card p{font-size:13px;color:#666;line-height:1.6}
.welcome-card .icon{font-size:40px;margin-bottom:12px}
.ready-metrics{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.ready-metric{background:#f8f9fb;border:1px solid #e0e4ea;border-radius:8px;padding:10px 16px;text-align:center}
.ready-metric .val{font-size:18px;font-weight:700;color:#4a6cf7}
.ready-metric .lbl{font-size:11px;color:#888;margin-top:2px}

/* SECTIONS */
.section{background:#fff;border:1px solid #e0e4ea;border-radius:10px;padding:20px;margin-bottom:20px}
.section-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #f0f2f6}
.metric-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.metric-box{background:#f8f9fb;border:1px solid #e0e4ea;border-radius:8px;padding:12px 16px;flex:1;min-width:120px}
.metric-box .mval{font-size:18px;font-weight:700;color:#4a6cf7}
.metric-box .mlbl{font-size:11px;color:#888;margin-top:3px}

/* TABLES */
.table-wrapper{overflow-x:auto;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f8f9fb}
th{padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e4ea;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f0f2f6;color:#333}
tr:hover td{background:#fafbff}

/* TABS (KPI) */
.kpi-tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;border-bottom:2px solid #e0e4ea;padding-bottom:4px}
.kpi-tab{padding:6px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;background:#f0f2f6;color:#555;transition:all .15s}
.kpi-tab:hover{background:#e4e8f4}
.kpi-tab.active{background:#4a6cf7;color:#fff;border-color:#4a6cf7}
.kpi-panel{display:none}
.kpi-panel.active{display:block}

/* INSIGHTS */
.insights-list{margin:8px 0 0 0;padding:0;list-style:none}
.insights-list li{padding:5px 0 5px 16px;position:relative;font-size:12px;color:#444;line-height:1.6;border-bottom:1px solid #f5f5f5}
.insights-list li:last-child{border-bottom:none}
.insights-list li::before{content:"•";position:absolute;left:4px;color:#4a6cf7;font-weight:700}

/* EXPANDERS */
details{border:1px solid #e0e4ea;border-radius:8px;margin-top:10px;overflow:hidden}
details summary{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;background:#f8f9fb;color:#333;user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▶";font-size:10px;color:#4a6cf7;transition:transform .2s}
details[open] summary::before{transform:rotate(90deg)}
.details-body{padding:14px;font-size:12px;line-height:1.7;color:#333}
.details-body strong{color:#1a1a2e}

/* ANOMALY */
.badge-warning{background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;margin:8px 0;display:inline-block}
.badge-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;margin:8px 0;display:inline-block}

/* CORRELATION */
.corr-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.corr-controls label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px}
.corr-controls select{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;min-width:180px;background:#fff}
.corr-controls input[type=checkbox]{margin-right:5px;accent-color:#4a6cf7}
.submit-btn{padding:8px 20px;background:#4a6cf7;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:#3a5ce5}
.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:#f8f9fb;border:1px solid #e0e4ea;border-radius:8px;padding:10px 16px;text-align:center;min-width:100px}
.stat-box .sv{font-size:17px;font-weight:700;color:#4a6cf7}
.stat-box .sl{font-size:11px;color:#888;margin-top:2px}

/* ANOMALY METHOD */
.method-radios{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.method-radio-label{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid #dde1ea;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#555;background:#fff;transition:all .2s}
.method-radio-label:hover{border-color:#4a6cf7;color:#4a6cf7}
.method-radio-label input{display:none}
.method-radio-label.selected{background:#eef2ff;border-color:#4a6cf7;color:#4a6cf7}
.method-card{background:#f8f9fb;border:1px solid #e0e4ea;border-radius:8px;padding:14px;margin-bottom:14px;font-size:12px;line-height:1.7;color:#444}
.method-card h4{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:8px}
.exec-btn{padding:10px 24px;background:#e67e22;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:16px}
.exec-btn:hover{background:#d35400}

/* SPINNER */
.spinner{display:none;text-align:center;padding:40px;color:#888;font-size:13px}
.spinner.visible{display:block}

/* TWO-COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.corr-controls{flex-direction:column}}
</style>
</head>

<script>
// ============================================================
// SECTION 1: CONSTANTS
// ============================================================
const COLUMN_MAP = {
  date: 'Date', campaignId: 'Campaign_ID', brand: 'Brand',
  channel: 'Channel', objective: 'Objective', impressions: 'Impressions',
  clicks: 'Clicks', spend: 'Spend_USD', conversions: 'Conversions',
  videoViews: 'Video_Views', reach: 'Reach', frequency: 'Frequency'
};
const REGISTRY_COLUMN_MAP = {
  campaignId: 'Campaign_ID', startDate: 'Start_Date',
  endDate: 'End_Date', budget: 'Budget_USD'
};
const REQUIRED_CAMPAIGN_COLS = Object.values(COLUMN_MAP);
const RAW_KPI_COLUMNS = ['Impressions','Clicks','Spend_USD','Conversions','Video_Views','Reach','Frequency'];
const DERIVED_KPI_COLUMNS = ['CTR','CVR','CPM','CPC','CPA','VTR'];
const KPI_COLUMNS = [...RAW_KPI_COLUMNS, ...DERIVED_KPI_COLUMNS];

const KPI_LABELS = {
  Impressions:'Impressions', Clicks:'Clicks', Spend_USD:'Spend (USD)',
  Conversions:'Conversions', Video_Views:'Video Views', Reach:'Reach', Frequency:'Frequency',
  CTR:'Click-Through Rate (%)', CVR:'Conversion Rate (%)', CPM:'Cost per Mille (USD)',
  CPC:'Cost per Click (USD)', CPA:'Cost per Acquisition (USD)', VTR:'View-Through Rate (%)'
};
const KPI_DESCRIPTIONS = {
  CTR:'Ad engagement rate. Higher CTR suggests stronger creative or better audience targeting.',
  CVR:'Share of clicks leading to a conversion. Reflects landing page quality and offer relevance.',
  CPM:'Cost to deliver 1,000 impressions. Core efficiency metric for awareness-objective campaigns.',
  CPC:'Average cost of each click. Lower CPC = more cost-efficient traffic acquisition.',
  CPA:'Average cost per conversion. Primary efficiency KPI for performance-oriented campaigns.',
  VTR:'Proportion of impressions that resulted in a video view. Applicable to Video and OTT channels only.',
  Impressions:'Total number of times ads were served to users.',
  Clicks:'Total number of user clicks on ads.',
  Spend_USD:'Total media spend in US Dollars.',
  Conversions:'Number of completed goal actions attributed to this campaign.',
  Video_Views:'Number of video ad views. Populated for Video and OTT channels only.',
  Reach:'Estimated number of unique users exposed to ads.',
  Frequency:'Average number of times a unique user was shown ads (Impressions ÷ Reach).'
};

const ANOMALY_Z_THRESHOLD = 3.0;
const ANOMALY_IQR_MULTIPLIER = 1.5;
const ANOMALY_ROLLING_WINDOW = 7;
const ANOMALY_ROLLING_STD_MULTIPLIER = 2.0;

const METHOD_LABELS = [
  'Z-Score (Standard Score) Method',
  'IQR (Interquartile Range) Method',
  'Time Series Statistical Method'
];
const METHOD_INFO = {
  'Z-Score (Standard Score) Method': {
    what: 'The Z-Score method measures how many standard deviations a data point is from the mean of the distribution.',
    how: 'Flags values where |value − mean| / std > 3.0. Assumes data is approximately normally distributed.',
    best_for: 'KPIs with roughly normal distributions such as Impressions, Clicks, and Spend. Works best with datasets of 30+ points.'
  },
  'IQR (Interquartile Range) Method': {
    what: 'The IQR method is a rank-based, distribution-free approach. It uses the spread of the middle 50% of the data.',
    how: 'Computes Q1 and Q3. Flags values outside [Q1 − 1.5×IQR, Q3 + 1.5×IQR]. Robust to outliers.',
    best_for: 'Skewed distributions or KPIs with heavy tails (e.g., CPA, CPC). Effective even with small sample sizes.'
  },
  'Time Series Statistical Method': {
    what: 'Uses a rolling 7-day window to compute local mean and standard deviation, then flags values that deviate significantly from their local context.',
    how: 'Flags values outside rolling_mean ± 2 × rolling_std. Adapts to trends and seasonality in the data.',
    best_for: 'KPIs that have clear temporal trends or seasonality. Best when campaign performance shifts over time.'
  }
};

// ============================================================
// SECTION 2: STATE
// ============================================================
const state = {
  campaignRows: null, registryRows: null,
  campaignFileName: null, registryFileName: null,
  activeView: null,
  anomalyResults: null, anomalyMethodUsed: null,
  corrDone: false,
  edaRenderedTabs: new Set(),
  anomalyRenderedTabs: new Set()
};

// ============================================================
// SECTION 3: DATA LOADER
// ============================================================
function parseCsv(file) {
  return new Promise((resolve, reject) => {
    Papa.parse(file, {
      header: true, dynamicTyping: false, skipEmptyLines: true,
      complete: r => resolve(r), error: e => reject(e)
    });
  });
}

async function loadCampaignData(file) {
  let result;
  try { result = await parseCsv(file); } catch(e) { return { data:null, error:'Could not read file: '+e }; }
  const rows = result.data;
  if (!rows.length) return { data:null, error:'File is empty.' };

  const missing = REQUIRED_CAMPAIGN_COLS.filter(c => !(c in rows[0]));
  if (missing.length) return { data:null, error:'Missing columns: '+missing.join(', ') };

  const cleaned = rows.map(row => {
    const r = {...row};
    // Parse date
    const d = new Date(r.Date);
    r._date = isNaN(d.getTime()) ? null : d;
    r._dateStr = r._date ? r._date.toISOString().slice(0,10) : null;
    // Clean currency
    r.Spend_USD = parseFloat(String(r.Spend_USD||'').replace(/[$,]/g,'')) || NaN;
    // Coerce raw KPIs
    for (const col of RAW_KPI_COLUMNS) {
      if (col !== 'Spend_USD') r[col] = r[col]===''||r[col]==null ? NaN : (parseFloat(r[col]) || (parseFloat(r[col])===0?0:NaN));
    }
    return r;
  }).filter(r => r._date !== null);

  if (!cleaned.length) return { data:null, error:'No valid dates found in Date column.' };
  return { data: computeDerivedKpis(cleaned), error: null };
}

async function loadRegistryData(file) {
  let result;
  try { result = await parseCsv(file); } catch(e) { return { data:null, error:'Could not read file: '+e }; }
  const rows = result.data;
  if (!rows.length) return { data:null, error:'File is empty.' };
  if (!('Campaign_ID' in rows[0])) return { data:null, error:"Missing column: 'Campaign_ID'" };

  const cleaned = rows.filter(r => {
    const cid = String(r.Campaign_ID||'').trim();
    return cid && !cid.startsWith('---');
  }).map(row => {
    const r = {...row};
    r.Budget_USD = parseFloat(String(r.Budget_USD||'').replace(/[$,]/g,'')) || NaN;
    if (r.Start_Date) r._startDate = new Date(r.Start_Date);
    if (r.End_Date)   r._endDate   = new Date(r.End_Date);
    return r;
  });

  if (!cleaned.length) return { data:null, error:'No valid campaign rows found.' };
  return { data: cleaned, error: null };
}

// ============================================================
// SECTION 4: DERIVED KPI COMPUTATION
// ============================================================
function computeDerivedKpis(rows) {
  return rows.map(r => {
    const imp = r.Impressions, clk = r.Clicks, spd = r.Spend_USD;
    const con = r.Conversions, vvw = r.Video_Views;
    return {
      ...r,
      CTR: (imp > 0) ? clk / imp * 100 : NaN,
      CVR: (clk > 0) ? con / clk * 100 : NaN,
      CPM: (imp > 0) ? spd / imp * 1000 : NaN,
      CPC: (clk > 0) ? spd / clk : NaN,
      CPA: (con > 0) ? spd / con : NaN,
      VTR: (imp > 0) ? vvw / imp * 100 : NaN
    };
  });
}

// ============================================================
// SECTION 5: DATA UTILS
// ============================================================
function groupBy(rows, keyFn) {
  const map = new Map();
  for (const row of rows) {
    const key = keyFn(row);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(row);
  }
  return map;
}

function uniqueValues(rows, col) {
  return [...new Set(rows.map(r => r[col]).filter(v => v != null && v !== ''))];
}

function numericVals(rows, col) {
  return rows.map(r => r[col]).filter(v => isFinite(v) && !isNaN(v));
}

function sumCol(rows, col) { return numericVals(rows, col).reduce((a,b)=>a+b, 0); }

function meanCol(rows, col) {
  const v = numericVals(rows, col);
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : NaN;
}

function minCol(rows, col) { const v = numericVals(rows, col); return v.length ? Math.min(...v) : NaN; }
function maxCol(rows, col) { const v = numericVals(rows, col); return v.length ? Math.max(...v) : NaN; }

function medianCol(rows, col) {
  const v = numericVals(rows, col).slice().sort((a,b)=>a-b);
  if (!v.length) return NaN;
  const m = Math.floor(v.length/2);
  return v.length%2 ? v[m] : (v[m-1]+v[m])/2;
}

function sortBy(arr, key, desc=false) {
  return arr.slice().sort((a,b) => desc ? (b[key]>a[key]?1:-1) : (a[key]>b[key]?1:-1));
}

function pivotDailySum(rows, kpiCol) {
  const map = groupBy(rows, r => r._dateStr);
  return [...map.entries()]
    .map(([date, grp]) => ({ date, value: sumCol(grp, kpiCol) }))
    .filter(d => d.date)
    .sort((a,b) => a.date < b.date ? -1 : 1);
}

function fmtNum(v, decimals=2) {
  if (v == null || isNaN(v) || !isFinite(v)) return '—';
  return v.toLocaleString('en-US', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}

function fmtDate(d) {
  if (!d) return '—';
  if (d instanceof Date) return d.toISOString().slice(0,10);
  return String(d).slice(0,10);
}

// ============================================================
// SECTION 6: STATISTICS
// ============================================================
function percentile(sorted, p) {
  if (!sorted.length) return NaN;
  const i = p * (sorted.length - 1);
  const lo = Math.floor(i), hi = Math.ceil(i);
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (i - lo);
}

function zscoreAnomalies(values) {
  const clean = values.filter(v => isFinite(v) && !isNaN(v));
  if (!clean.length) return { mask: values.map(()=>false), scores: values.map(()=>NaN) };
  const mean = clean.reduce((a,b)=>a+b,0) / clean.length;
  const std = Math.sqrt(clean.reduce((a,b)=>a+(b-mean)**2,0) / clean.length) || 1;
  const scores = values.map(v => (isFinite(v)&&!isNaN(v)) ? Math.abs((v-mean)/std) : NaN);
  const mask = scores.map(s => isFinite(s) && s > ANOMALY_Z_THRESHOLD);
  return { mask, scores };
}

function iqrAnomalies(values) {
  const sorted = values.filter(v=>isFinite(v)&&!isNaN(v)).slice().sort((a,b)=>a-b);
  if (!sorted.length) return { mask: values.map(()=>false), scores: values.map(()=>0) };
  const Q1 = percentile(sorted, 0.25);
  const Q3 = percentile(sorted, 0.75);
  const IQR = Q3 - Q1;
  const lower = Q1 - ANOMALY_IQR_MULTIPLIER * IQR;
  const upper = Q3 + ANOMALY_IQR_MULTIPLIER * IQR;
  const mask = values.map(v => isFinite(v)&&!isNaN(v) && (v<lower||v>upper));
  const scores = values.map(v => {
    if (!isFinite(v)||isNaN(v)||IQR===0) return 0;
    if (v < lower) return (lower-v)/IQR;
    if (v > upper) return (v-upper)/IQR;
    return 0;
  });
  return { mask, scores };
}

function timeseriesAnomalies(values) {
  const means = [], stds = [];
  for (let i=0; i<values.length; i++) {
    const start = Math.max(0, i - ANOMALY_ROLLING_WINDOW + 1);
    const slice = [];
    for (let j=start; j<=i; j++) { if (isFinite(values[j])&&!isNaN(values[j])) slice.push(values[j]); }
    if (!slice.length) { means.push(NaN); stds.push(0); continue; }
    const m = slice.reduce((a,b)=>a+b,0)/slice.length;
    means.push(m);
    stds.push(slice.length>1 ? Math.sqrt(slice.reduce((a,b)=>a+(b-m)**2,0)/(slice.length-1)) : 0);
  }
  const upper = means.map((m,i)=>m+ANOMALY_ROLLING_STD_MULTIPLIER*stds[i]);
  const lower = means.map((m,i)=>m-ANOMALY_ROLLING_STD_MULTIPLIER*stds[i]);
  const mask = values.map((v,i)=>isFinite(v)&&!isNaN(v)&&(v>upper[i]||v<lower[i]));
  const scores = values.map((v,i)=>{
    if (!isFinite(v)||isNaN(v)||stds[i]===0) return 0;
    return Math.abs(v-means[i])/stds[i];
  });
  return { mask, scores };
}

// Lanczos lgamma
function lgamma(x) {
  const g=7, c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,
    -176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  if (x<0.5) return Math.log(Math.PI)-Math.log(Math.abs(Math.sin(Math.PI*x)))-lgamma(1-x);
  x-=1;
  let a=c[0];
  for (let i=0;i<g;i++) a+=c[i+1]/(x+i+1);
  const t=x+g+0.5;
  return 0.5*Math.log(2*Math.PI)+(x+0.5)*Math.log(t)-t+Math.log(a);
}

function betacf(a,b,x) {
  const maxIter=200,eps=3e-7,fpmin=1e-30;
  const qab=a+b,qap=a+1,qam=a-1;
  let c=1,d=1-qab*x/qap;
  if (Math.abs(d)<fpmin) d=fpmin;
  d=1/d; let h=d;
  for (let m=1;m<=maxIter;m++) {
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<fpmin)d=fpmin;
    c=1+aa/c; if(Math.abs(c)<fpmin)c=fpmin;
    d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<fpmin)d=fpmin;
    c=1+aa/c; if(Math.abs(c)<fpmin)c=fpmin;
    d=1/d; const delta=d*c; h*=delta;
    if(Math.abs(delta-1)<eps) break;
  }
  return h;
}

function betai(a,b,x) {
  if (x<=0) return 0; if (x>=1) return 1;
  const lbeta=lgamma(a)+lgamma(b)-lgamma(a+b);
  const front=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lbeta)/a;
  return front*betacf(a,b,x);
}

function pearsonR(xs, ys) {
  const n=xs.length;
  if (n<3) return { r:null, p:null, n };
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  const xm=xs.map(x=>x-mx), ym=ys.map(y=>y-my);
  const dot=(a,b)=>a.reduce((s,v,i)=>s+v*b[i],0);
  let r=dot(xm,ym)/(Math.sqrt(dot(xm,xm))*Math.sqrt(dot(ym,ym))+1e-12);
  r=Math.max(-1,Math.min(1,r));
  let p=0;
  if (Math.abs(r)<1 && n>2) {
    const t=r*Math.sqrt((n-2)/Math.max(1-r*r,1e-12));
    const df=n-2;
    const xb=df/(df+t*t);
    p=betai(df/2,0.5,xb);
  }
  return { r:+r.toFixed(4), p:isNaN(p)?null:+p.toFixed(4), n };
}

function computeCorrelationMatrix(rows, kpiCols) {
  const matrix=kpiCols.map(()=>kpiCols.map(()=>null));
  for (let i=0;i<kpiCols.length;i++) {
    matrix[i][i]=1;
    for (let j=i+1;j<kpiCols.length;j++) {
      const pairs=rows.filter(r=>isFinite(r[kpiCols[i]])&&!isNaN(r[kpiCols[i]])&&isFinite(r[kpiCols[j]])&&!isNaN(r[kpiCols[j]]));
      if (pairs.length<3) { matrix[i][j]=matrix[j][i]=null; continue; }
      const { r }=pearsonR(pairs.map(r=>r[kpiCols[i]]),pairs.map(r=>r[kpiCols[j]]));
      matrix[i][j]=matrix[j][i]=r;
    }
  }
  return { cols:kpiCols, matrix };
}

// ============================================================
// SECTION 7: ANOMALY SKILL
// ============================================================
function detectAllKpis(rows, method) {
  const available = KPI_COLUMNS.filter(k => rows.some(r => isFinite(r[k])&&!isNaN(r[k])));
  const results = {};
  for (const kpi of available) {
    const values = rows.map(r => r[kpi]);
    let detection;
    if (method === METHOD_LABELS[0])      detection = zscoreAnomalies(values);
    else if (method === METHOD_LABELS[1]) detection = iqrAnomalies(values);
    else                                  detection = timeseriesAnomalies(values);
    const { mask, scores } = detection;
    const anomalyRows = rows.filter((_,i) => mask[i]).map((r,i) => ({
      ...r, _anomaly_score: +(scores[rows.indexOf(r)] || 0).toFixed(4)
    }));
    // re-index scores properly
    const anomalyRowsFinal = [];
    let ai = 0;
    rows.forEach((r, i) => {
      if (mask[i]) anomalyRowsFinal.push({ ...r, _anomaly_score: +scores[i].toFixed(4) });
    });
    results[kpi] = { anomalyRows: anomalyRowsFinal, mask, scores, allRows: rows };
  }
  return results;
}

function genOverviewInsights(ov) {
  const span = Math.round((ov.end - ov.start) / 86400000) + 1;
  const avg = (ov.totalRows / Math.max(ov.campaigns, 1)).toFixed(1);
  return [
    `The dataset spans <strong>${span} calendar days</strong> from ${fmtDate(ov.start)} to ${fmtDate(ov.end)}.`,
    `<strong>${ov.campaigns} campaigns</strong> run across <strong>${ov.brands} brands</strong>, averaging <strong>${avg} daily records per campaign</strong>.`,
    `A total of <strong>${ov.totalRows.toLocaleString()} daily data points</strong> are available.`
  ];
}

function genActivityInsights(activity) {
  if (!activity.length) return ['No campaign activity data available.'];
  const most = activity[0], least = activity[activity.length-1];
  const avg = activity.reduce((s,a)=>s+a.activeDays,0)/activity.length;
  const above = activity.filter(a=>a.activeDays>avg).length;
  const gap = most.activeDays - least.activeDays;
  return [
    `<strong>${most.Campaign_ID}</strong> ran the longest with <strong>${most.activeDays} active days</strong>, suggesting a sustained always-on media strategy.`,
    `<strong>${least.Campaign_ID}</strong> was the shortest flight at <strong>${least.activeDays} days</strong>.`,
    `Campaigns averaged <strong>${avg.toFixed(1)} active days</strong>; <strong>${above} of ${activity.length} campaigns</strong> exceeded this.`,
    `A <strong>${gap}-day spread</strong> between the busiest and shortest campaigns signals a mix of always-on and short-burst strategies.`
  ];
}

function genChannelInsights(channels) {
  if (!channels.length) return ['No channel data available.'];
  const multi = channels.filter(c=>c.Unique_Channels>1).length;
  const single = channels.filter(c=>c.Unique_Channels===1).length;
  const maxRow = channels.reduce((a,b)=>b.Unique_Channels>a.Unique_Channels?b:a);
  const brandMap = groupBy(channels, c=>c.Brand);
  let topBrand='', topAvg=0;
  brandMap.forEach((grp,brand)=>{
    const avg=grp.reduce((s,c)=>s+c.Unique_Channels,0)/grp.length;
    if(avg>topAvg){topAvg=avg;topBrand=brand;}
  });
  return [
    `<strong>${multi} campaign–brand pairs</strong> span multiple channels, reflecting a cross-channel reach strategy.`,
    `<strong>${single} pairs</strong> are single-channel only.`,
    `<strong>${maxRow.Campaign_ID}</strong> (Brand ${maxRow.Brand}) uses <strong>${maxRow.Unique_Channels} channels</strong>, the widest spread.`,
    `<strong>Brand ${topBrand}</strong> averages the most channels per campaign.`
  ];
}

function genKpiInsights(rows, kpi, kpiSummBycamp) {
  const vals = numericVals(rows, kpi);
  if (!vals.length) return [`No data available for <strong>${kpi}</strong>.`];
  const mean = vals.reduce((a,b)=>a+b,0)/vals.length;
  const std = Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length);
  const cv = mean!==0 ? std/mean*100 : 0;
  const nullPct = rows.filter(r=>!isFinite(r[kpi])||isNaN(r[kpi])).length/rows.length*100;
  const variability = cv>50?'high':cv>20?'moderate':'low';
  const varMsg = cv>50?'performance varies significantly — investigate peak drivers':cv>20?'some variation worth monitoring':'performance is stable and predictable';
  const bullets = [
    `Daily <strong>${kpi}</strong> ranges from <strong>${fmtNum(Math.min(...vals))}</strong> to <strong>${fmtNum(Math.max(...vals))}</strong> with a mean of <strong>${fmtNum(mean)}</strong>.`,
    `A coefficient of variation of <strong>${cv.toFixed(1)}%</strong> indicates <strong>${variability} variability</strong> — ${varMsg}.`
  ];
  if (kpiSummBycamp && kpiSummBycamp.length) {
    const top = kpiSummBycamp.reduce((a,b)=>b.mean>a.mean?b:a);
    if (top && isFinite(top.mean)) bullets.push(`<strong>${top.Campaign_ID}</strong> leads with the highest average ${kpi} (${fmtNum(top.mean)}).`);
  }
  const isVideo = kpi==='Video_Views'||kpi==='VTR';
  bullets.push(nullPct>0
    ? `<strong>${nullPct.toFixed(1)}% missing values</strong>${isVideo?' — expected for Video/OTT channels only':' — may correspond to paused campaign days'}.`
    : `<strong>No missing values</strong> in ${kpi} — complete data coverage.`);
  return bullets;
}

function genNullInsights(nullCounts, totalRows) {
  const total = nullCounts.length;
  const withNulls = nullCounts.filter(n=>n.count>0);
  const clean = total - withNulls.length;
  const bullets = [`<strong>${clean} of ${total} columns</strong> are fully complete with zero missing values.`];
  if (withNulls.length) {
    const worst = withNulls[0];
    const pct = (worst.count/totalRows*100).toFixed(1);
    const isVideo = worst.col.includes('Video')||worst.col==='VTR';
    bullets.push(`<strong>${worst.col}</strong> has the most nulls (<strong>${worst.count.toLocaleString()}</strong> rows, ${pct}%)${isVideo?' — expected for Video/OTT channels':' — worth investigating'}.`);
    bullets.push(`<strong>${withNulls.length} column(s)</strong> contain missing data; aggregations exclude nulls automatically.`);
  }
  bullets.push('Null values in derived KPIs (CTR, CVR, CPM, CPC, CPA, VTR) arise when the denominator is zero or absent.');
  return bullets;
}

function genPairwiseInsights(stats, col1, col2) {
  const {r, p, n} = stats;
  if (r===null) return ['Insufficient data — at least 3 non-null paired rows required.'];
  const abs_r=Math.abs(r);
  const strength=abs_r>=0.7?'strong':abs_r>=0.5?'moderate':abs_r>=0.3?'weak':'negligible';
  const direction=r>0?'positive':'negative';
  let sigText;
  if (p===null) sigText='statistical significance could not be determined';
  else if (p<0.001) sigText='highly statistically significant (p < 0.001)';
  else if (p<0.01) sigText='very significant (p < 0.01)';
  else if (p<0.05) sigText='statistically significant (p < 0.05)';
  else sigText='not statistically significant (p ≥ 0.05) — treat with caution';
  const bullets = [
    `Pearson r = <strong>${r}</strong> indicates a <strong>${strength} ${direction} linear relationship</strong> between <strong>${col1}</strong> and <strong>${col2}</strong>.`,
    `This result is <strong>${sigText}</strong>, computed on <strong>${n.toLocaleString()} paired observations</strong>.`
  ];
  if (direction==='positive'&&abs_r>=0.5) bullets.push(`Campaigns high on <strong>${col1}</strong> tend to be high on <strong>${col2}</strong> — these metrics likely share the same campaign driver.`);
  else if (direction==='negative'&&abs_r>=0.5) bullets.push(`As <strong>${col1}</strong> rises, <strong>${col2}</strong> tends to fall — a potential efficiency trade-off.`);
  else if (abs_r<0.3) bullets.push(`The negligible correlation means these metrics largely move independently.`);
  else bullets.push(`The ${strength} relationship suggests some co-movement, but both also respond to separate influences.`);
  if (n<30) bullets.push(`<strong>Note:</strong> Only <strong>${n} data points</strong> available — interpret with caution.`);
  return bullets;
}

function genHeatmapInsights(cols, matrix) {
  const pairs=[];
  for (let i=0;i<cols.length;i++) for (let j=i+1;j<cols.length;j++) {
    if (matrix[i][j]!==null) pairs.push({c1:cols[i],c2:cols[j],r:matrix[i][j]});
  }
  if (!pairs.length) return ['Not enough numeric data to build a full correlation matrix.'];
  const byAbs=pairs.slice().sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
  const top=byAbs[0];
  const strong=pairs.filter(p=>Math.abs(p.r)>=0.7);
  const neg=pairs.filter(p=>p.r<-0.3).sort((a,b)=>a.r-b.r);
  const avgAbs=cols.map((_,i)=>{
    const vals=cols.map((_,j)=>j!==i&&matrix[i][j]!==null?Math.abs(matrix[i][j]):null).filter(v=>v!==null);
    return {col:cols[i],avg:vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0};
  });
  const mostIndep=avgAbs.reduce((a,b)=>b.avg<a.avg?b:a).col;
  const bullets=[
    `<strong>${top.c1} ↔ ${top.c2}</strong> is the strongest pair (r = <strong>${top.r}</strong>) — closely linked metrics likely driven by the same factors.`
  ];
  if (strong.length>1) bullets.push(`<strong>${strong.length} metric pairs</strong> show strong correlations (|r| ≥ 0.70) — these KPIs may partially capture the same signal.`);
  else bullets.push('Most metric pairs show moderate-to-weak correlations — the KPIs capture distinct aspects of performance.');
  if (neg.length) bullets.push(`<strong>${neg[0].c1} ↔ ${neg[0].c2}</strong> (r = ${neg[0].r}) is the sharpest negative relationship — a potential efficiency trade-off.`);
  else bullets.push('No meaningful negative correlations found — all significant relationships trend in the same direction.');
  bullets.push(`<strong>${mostIndep}</strong> has the lowest average correlation with other KPIs — it captures a unique dimension of performance.`);
  return bullets;
}

function genAnomalyInsights(anomalyRows, kpi, method) {
  const label = KPI_LABELS[kpi]||kpi;
  if (!anomalyRows.length) return `No anomalies detected in <strong>${label}</strong> using the <strong>${method}</strong>. The metric is performing within expected statistical bounds across all campaigns and dates.`;
  const n=anomalyRows.length;
  const dates=[...new Set(anomalyRows.map(r=>r._dateStr))].sort().slice(0,6);
  const dateStr=dates.join(', ')+(anomalyRows.length>6?' …':'');
  const campaigns=[...new Set(anomalyRows.map(r=>r.Campaign_ID))].slice(0,6);
  const brands=[...new Set(anomalyRows.map(r=>r.Brand))];
  const channels=[...new Set(anomalyRows.map(r=>r.Channel))];
  const vals=numericVals(anomalyRows,kpi);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const desc=KPI_DESCRIPTIONS[kpi]?`<em>${KPI_DESCRIPTIONS[kpi]}</em><br><br>`:'';
  return `<strong>${n} anomalous data point(s)</strong> detected in <strong>${label}</strong> using the <strong>${method}</strong>.<br><br>${desc}` +
    `<strong>Affected dates:</strong> ${dateStr}<br>` +
    `<strong>Affected campaigns:</strong> ${campaigns.join(', ')}${campaigns.length>=6?' …':''}<br>` +
    `<strong>Affected brands:</strong> ${brands.join(', ')}<br>` +
    `<strong>Affected channels:</strong> ${channels.join(', ')}<br>` +
    `<strong>Value range:</strong> ${fmtNum(Math.min(...vals))} – ${fmtNum(Math.max(...vals))} (avg: ${fmtNum(avg)})<br><br>` +
    `Review the dates and campaigns above for unusual activity such as budget pacing changes, creative rotations, or external market events.`;
}

function genAnomalyRecommendations(anomalyRows, kpi, method) {
  const label = KPI_LABELS[kpi]||kpi;
  if (!anomalyRows.length) return `No action required. <strong>${label}</strong> is performing within normal statistical bounds. Continue monitoring and re-run detection as new data becomes available.`;
  const n=anomalyRows.length;
  const camps=[...new Set(anomalyRows.map(r=>r.Campaign_ID))].slice(0,4);
  const campStr=camps.join(', ')+(camps.length>=4?' …':'');
  return `<strong>Strategic Recommendations for ${label} Anomalies (${n} flagged points):</strong><br><br>` +
    `<strong>1. Investigate Campaign Configuration</strong> — Review budget pacing, bidding strategy, and targeting settings for (${campStr}). Unexpected spikes often stem from automated bid changes or budget cap removals.<br><br>` +
    `<strong>2. Validate Data Quality</strong> — Confirm that tracking pixels and conversion tags are firing correctly on the anomalous dates. Duplicate event tracking is a common cause of inflated counts.<br><br>` +
    `<strong>3. Cross-Reference External Events</strong> — Check for public holidays, competitor activity, or market disruptions on the flagged dates.<br><br>` +
    `<strong>4. Review Audience &amp; Creative Changes</strong> — If a new audience segment or creative was launched around the anomaly dates, assess its direct impact on ${label}.<br><br>` +
    `<strong>5. Set Automated Alerts</strong> — Configure platform-level budget alerts and anomaly notifications to catch similar deviations in real time.`;
}

function mdToHtml(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const out = [];
  let inUl=false, inOl=false;
  for (let line of lines) {
    const trimmed = line.trim();
    const isUl = /^[-*] /.test(trimmed);
    const olMatch = trimmed.match(/^(\d+)\. (.+)/);
    if (isUl) {
      if (inOl){out.push('</ol>');inOl=false;}
      if (!inUl){out.push('<ul>');inUl=true;}
      out.push('<li>'+inlineFormat(trimmed.replace(/^[-*] /,''))+'</li>');
    } else if (olMatch) {
      if (inUl){out.push('</ul>');inUl=false;}
      if (!inOl){out.push('<ol>');inOl=true;}
      out.push('<li>'+inlineFormat(olMatch[2])+'</li>');
    } else {
      if (inUl){out.push('</ul>');inUl=false;}
      if (inOl){out.push('</ol>');inOl=false;}
      if (!trimmed) out.push('<br>');
      else out.push('<p>'+inlineFormat(trimmed)+'</p>');
    }
  }
  if (inUl) out.push('</ul>');
  if (inOl) out.push('</ol>');
  return out.join('');
}

function inlineFormat(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
}

        <div class="metric-box"><div class="mval">${brands.length}</div><div class="mlbl">Unique Brands</div></div>
        <div class="metric-box"><div class="mval">${rows.length.toLocaleString()}</div><div class="mlbl">Total Rows</div></div>
      </div>
      ${insightsList(genOverviewInsights(ov))}
    </div>`;

  // Campaign Activity
  const actMap=groupBy(rows,r=>r.Campaign_ID);
  const activity=[];
  actMap.forEach((grp,cid)=>activity.push({Campaign_ID:cid,activeDays:new Set(grp.map(r=>r._dateStr)).size}));
  activity.sort((a,b)=>b.activeDays-a.activeDays);
  const top10=activity.slice(0,10), bot10=activity.slice(-10).reverse();
  const activityHtml=`
    <div class="section">
      <div class="section-title">📅 Campaign Activity</div>
      <div class="two-col">
        <div><strong style="font-size:12px;color:#555">Top 10 Most Active</strong>
          ${renderTable(['Campaign_ID','Active Days'],top10.map(a=>({'Campaign_ID':a.Campaign_ID,'Active Days':a.activeDays})))}</div>
        <div><strong style="font-size:12px;color:#555">Bottom 10 Least Active</strong>
          ${renderTable(['Campaign_ID','Active Days'],bot10.map(a=>({'Campaign_ID':a.Campaign_ID,'Active Days':a.activeDays})))}</div>
      </div>
      <div id="activity-chart" style="margin-top:12px"></div>
      ${insightsList(genActivityInsights(activity))}
    </div>`;

  // Channels
  const chanMap=groupBy(rows,r=>r.Campaign_ID+'\0'+r.Brand);
  const channels=[];
  chanMap.forEach((grp,key)=>{
    const [cid,brand]=key.split('\0');
    channels.push({Campaign_ID:cid,Brand:brand,Unique_Channels:new Set(grp.map(r=>r.Channel)).size});
  });
  channels.sort((a,b)=>a.Brand<b.Brand?-1:a.Brand>b.Brand?1:a.Campaign_ID<b.Campaign_ID?-1:1);
  const channelsHtml=`
    <div class="section">
      <div class="section-title">📡 Channels per Campaign</div>
      ${renderTable(['Campaign_ID','Brand','Unique_Channels'],channels)}
      ${insightsList(genChannelInsights(channels))}
    </div>`;

  // KPI Summary tabs
  const availKpis=KPI_COLUMNS.filter(k=>rows.some(r=>isFinite(r[k])&&!isNaN(r[k])));
  const kpiTabBar=availKpis.map((k,i)=>`<button class="kpi-tab${i===0?' active':''}" onclick="switchEDATab('${k}')">${k}</button>`).join('');
  const kpiPanels=availKpis.map((k,i)=>`<div class="kpi-panel${i===0?' active':''}" id="eda-panel-${k}"><div id="eda-chart-${k}" style="height:300px"></div><div id="eda-table-${k}"></div><div id="eda-insights-${k}"></div></div>`).join('');
  const kpiHtml=`
    <div class="section">
      <div class="section-title">📊 KPI Summary</div>
      <div class="kpi-tab-bar">${kpiTabBar}</div>
      ${kpiPanels}
    </div>`;

  // Null counts
  const allCols=[...Object.values(COLUMN_MAP),...DERIVED_KPI_COLUMNS];
  const nullCounts=allCols.filter(c=>rows[0]&&c in rows[0]).map(col=>({col,count:rows.filter(r=>!isFinite(r[col])||isNaN(r[col])).length})).sort((a,b)=>b.count-a.count);
  const nullHtml=`
    <div class="section">
      <div class="section-title">🔍 Null Value Analysis</div>
      ${renderTable(['Column','Null Count','% Missing'],nullCounts.map(n=>({'Column':n.col,'Null Count':n.count.toLocaleString(),'% Missing':(n.count/rows.length*100).toFixed(1)+'%'})))}
      ${insightsList(genNullInsights(nullCounts,rows.length))}
    </div>`;

  document.getElementById('content-area').innerHTML = overviewHtml+activityHtml+channelsHtml+kpiHtml+nullHtml;

  // Render activity chart
  const top25=activity.slice(0,25);
  Plotly.newPlot('activity-chart',
    [{type:'bar',x:top25.map(a=>a.Campaign_ID),y:top25.map(a=>a.activeDays),
      marker:{color:'steelblue'},text:top25.map(a=>a.activeDays),textposition:'outside'}],
    {title:{text:'Top 25 Campaigns by Active Days',font:{size:13}},
     xaxis:{tickangle:-45,tickfont:{size:10}},yaxis:{title:'Active Days'},
     margin:{t:40,b:100,l:50,r:20},height:320,plot_bgcolor:'#fafbff',paper_bgcolor:'#fff'},
    {responsive:true,displayModeBar:false}
  );

  // Render first KPI tab
  if (availKpis.length) renderEDATab(availKpis[0]);
}

function switchEDATab(kpi) {
  document.querySelectorAll('.kpi-tab').forEach(b=>{b.classList.toggle('active',b.textContent===kpi);});
  document.querySelectorAll('.kpi-panel').forEach(p=>{p.classList.toggle('active',p.id===`eda-panel-${kpi}`);});
  if (!state.edaRenderedTabs.has(kpi)) renderEDATab(kpi);
  else { const el=document.getElementById(`eda-chart-${kpi}`); if(el) Plotly.Plots.resize(el); }
}

function renderEDATab(kpi) {
  state.edaRenderedTabs.add(kpi);
  const rows=state.campaignRows;
  const daily=pivotDailySum(rows,kpi);
  const campMap=groupBy(rows,r=>r.Campaign_ID);
  const kpiSumm=[];
  campMap.forEach((grp,cid)=>{
    kpiSumm.push({Campaign_ID:cid,min:minCol(grp,kpi),max:maxCol(grp,kpi),mean:meanCol(grp,kpi),median:medianCol(grp,kpi)});
  });
  kpiSumm.sort((a,b)=>b.mean-a.mean);
  const fmt=v=>fmtNum(v);
  const tableEl=document.getElementById(`eda-table-${kpi}`);
  if(tableEl) tableEl.innerHTML=renderTable(
    ['Campaign_ID','Min','Max','Mean','Median'],
    kpiSumm.map(s=>({'Campaign_ID':s.Campaign_ID,'Min':fmt(s.min),'Max':fmt(s.max),'Mean':fmt(s.mean),'Median':fmt(s.median)}))
  );
  const insEl=document.getElementById(`eda-insights-${kpi}`);
  if(insEl) insEl.innerHTML=insightsList(genKpiInsights(rows,kpi,kpiSumm));
  const chartEl=document.getElementById(`eda-chart-${kpi}`);
  if(chartEl && daily.length) {
    Plotly.newPlot(chartEl,
      [{type:'scatter',mode:'lines+markers',x:daily.map(d=>d.date),y:daily.map(d=>d.value),
        line:{color:'steelblue',width:1.5},marker:{color:'steelblue',size:4},name:kpi}],
      {title:{text:`Daily ${kpi} (Sum)`,font:{size:13}},
       xaxis:{title:'Date'},yaxis:{title:kpi},
       margin:{t:40,b:60,l:60,r:20},height:300,plot_bgcolor:'#fafbff',paper_bgcolor:'#fff'},
      {responsive:true,displayModeBar:false}
    );
  }
}

// SECTION 13: CORRELATION VIEW
// ============================================================
function renderCorrelation() {
  document.getElementById('breadcrumb').innerHTML = '🏠 Home &rsaquo; 🔗 Correlation Analysis';
  const rows=state.campaignRows;
  const availKpis=KPI_COLUMNS.filter(k=>rows.some(r=>isFinite(r[k])&&!isNaN(r[k])));
  const opts=availKpis.map(k=>`<option value="${k}">${KPI_LABELS[k]||k}</option>`).join('');
  const opts2=availKpis.map((k,i)=>`<option value="${k}"${i===1?' selected':''}>${KPI_LABELS[k]||k}</option>`).join('');
  document.getElementById('content-area').innerHTML=`
    <div class="section">
      <div class="section-title">🔗 Correlation Analysis</div>
      <div class="corr-controls">
        <div><label>KPI 1</label><select id="corr-col1">${opts}</select></div>
        <div><label>KPI 2</label><select id="corr-col2">${opts2}</select></div>
        <div style="display:flex;align-items:center;gap:6px;padding-bottom:2px">
          <input type="checkbox" id="corr-show-all"><label for="corr-show-all" style="font-size:12px;font-weight:600;color:#555;cursor:pointer">Show full correlation matrix</label>
        </div>
        <button class="submit-btn" onclick="submitCorrelation()">Submit</button>
      </div>
      <div id="corr-results"></div>
    </div>`;
  if (state.corrDone) submitCorrelation();
}

function submitCorrelation() {
  state.corrDone=true;
  const rows=state.campaignRows;
  const col1=document.getElementById('corr-col1').value;
  const col2=document.getElementById('corr-col2').value;
  const showAll=document.getElementById('corr-show-all').checked;
  const availKpis=KPI_COLUMNS.filter(k=>rows.some(r=>isFinite(r[k])&&!isNaN(r[k])));

  const clean=rows.filter(r=>isFinite(r[col1])&&!isNaN(r[col1])&&isFinite(r[col2])&&!isNaN(r[col2]));
  const xs=clean.map(r=>r[col1]), ys=clean.map(r=>r[col2]);
  const stats=pearsonR(xs,ys);
  // OLS trendline
  let trendHtml='';
  const n=xs.length;
  let trendX=[], trendY=[];
  if(n>=2){
    const sumX=xs.reduce((a,b)=>a+b,0), sumY=ys.reduce((a,b)=>a+b,0);
    const sumXY=xs.reduce((s,x,i)=>s+x*ys[i],0), sumX2=xs.reduce((s,x)=>s+x*x,0);
    const m=(n*sumXY-sumX*sumY)/(n*sumX2-sumX**2||1e-12);
    const b=(sumY-m*sumX)/n;
    const xMin=Math.min(...xs), xMax=Math.max(...xs);
    trendX=[xMin,xMax]; trendY=[m*xMin+b,m*xMax+b];
  }

  const statsHtml=`
    <div class="stats-row">
      <div class="stat-box"><div class="sv">${stats.r!==null?stats.r:'N/A'}</div><div class="sl">Pearson r</div></div>
      <div class="stat-box"><div class="sv">${stats.p!==null?stats.p:'N/A'}</div><div class="sl">p-value</div></div>
      <div class="stat-box"><div class="sv">${stats.n.toLocaleString()}</div><div class="sl">Sample Size</div></div>
    </div>`;

  const insHtml=`<div style="margin:8px 0">${insightsList(genPairwiseInsights(stats,col1,col2))}</div>`;

  let heatmapHtml='';
  const corrMatrix=computeCorrelationMatrix(rows,availKpis);
  const matrixData=corrMatrix.matrix;
  const matCols=corrMatrix.cols;
  const annotations=[];
  for(let i=0;i<matCols.length;i++) for(let j=0;j<matCols.length;j++){
    annotations.push({x:j,y:i,text:matrixData[i][j]!==null?matrixData[i][j].toFixed(2):'',showarrow:false,font:{size:9,color:Math.abs(matrixData[i][j]||0)>0.5?'#fff':'#333'}});
  }

  const heatmapInsHtml=`<div style="margin:8px 0">${insightsList(genHeatmapInsights(matCols,matrixData))}</div>`;

  document.getElementById('corr-results').innerHTML=`
    ${statsHtml}
    <div id="corr-scatter" style="height:400px;margin-bottom:12px"></div>
    ${insHtml}
    <hr style="border:none;border-top:1px solid #e0e4ea;margin:16px 0">
    <div class="section-title" style="font-size:13px">Full Correlation Matrix</div>
    <div id="corr-heatmap" style="height:${Math.max(400,60*matCols.length)}px"></div>
    ${heatmapInsHtml}`;

  // Scatter plot
  Plotly.newPlot('corr-scatter',[
    {type:'scatter',mode:'markers',x:xs,y:ys,marker:{color:'steelblue',size:6,opacity:0.7},name:'Data'},
    {type:'scatter',mode:'lines',x:trendX,y:trendY,line:{color:'firebrick',width:2,dash:'dash'},name:'OLS Trend'}
  ],{
    xaxis:{title:KPI_LABELS[col1]||col1},yaxis:{title:KPI_LABELS[col2]||col2},
    title:{text:`${col1} vs ${col2}`,font:{size:13}},legend:{orientation:'h',y:-0.15},
    margin:{t:40,b:80,l:70,r:20},plot_bgcolor:'#fafbff',paper_bgcolor:'#fff'
  },{responsive:true,displayModeBar:false});

  // Heatmap
  Plotly.newPlot('corr-heatmap',[{
    type:'heatmap',
    z:matrixData.map(row=>row.map(v=>v===null?null:v)),
    x:matCols, y:matCols,
    colorscale:'RdBu', reversescale:true, zmin:-1, zmax:1,
    colorbar:{thickness:15,len:0.8}
  }],{
    annotations,
    xaxis:{tickangle:-45,tickfont:{size:10}},yaxis:{tickfont:{size:10},autorange:'reversed'},
    margin:{t:20,b:120,l:120,r:20},
    plot_bgcolor:'#fff',paper_bgcolor:'#fff'
  },{responsive:true,displayModeBar:false});
}

// SECTION 14: ANOMALY VIEW
// ============================================================
function renderAnomaly() {
  state.anomalyRenderedTabs = new Set();
  document.getElementById('breadcrumb').innerHTML = '🏠 Home &rsaquo; ⚠️ Anomaly Detection';
  const methodRadios=METHOD_LABELS.map((m,i)=>`
    <label class="method-radio-label${i===0?' selected':''}" id="method-label-${i}">
      <input type="radio" name="anomaly-method" value="${m}" ${i===0?'checked':''} onchange="onMethodChange(this)">
      ${m}
    </label>`).join('');
  document.getElementById('content-area').innerHTML=`
    <div class="section">
      <div class="section-title">⚠️ Anomaly Detection</div>
      <div style="margin-bottom:12px"><strong style="font-size:12px;color:#555">Select Detection Method</strong></div>
      <div class="method-radios">${methodRadios}</div>
      <div id="method-card"></div>
      <button class="exec-btn" onclick="executeAnomaly()">🔍 Execute Anomaly Detection</button>
      <div class="spinner" id="anomaly-spinner">Running anomaly detection…</div>
      <div id="anomaly-results"></div>
    </div>`;
  renderMethodCard(METHOD_LABELS[0]);
  if (state.anomalyResults && state.anomalyMethodUsed) {
    document.querySelectorAll('input[name="anomaly-method"]').forEach(r=>{r.checked=r.value===state.anomalyMethodUsed;});
    document.querySelectorAll('.method-radio-label').forEach((l,i)=>{l.classList.toggle('selected',METHOD_LABELS[i]===state.anomalyMethodUsed);});
    renderMethodCard(state.anomalyMethodUsed);
    renderAnomalyResults();
  }
}

function onMethodChange(radio) {
  document.querySelectorAll('.method-radio-label').forEach(l=>l.classList.remove('selected'));
  radio.closest('.method-radio-label').classList.add('selected');
  renderMethodCard(radio.value);
}

function renderMethodCard(method) {
  const info=METHOD_INFO[method];
  document.getElementById('method-card').innerHTML=`
    <div class="method-card">
      <h4>About: ${method}</h4>
      <strong>What:</strong> ${info.what}<br>
      <strong>How it flags:</strong> ${info.how}<br>
      <strong>Best for:</strong> ${info.best_for}
    </div>`;
}

function executeAnomaly() {
  const method=document.querySelector('input[name="anomaly-method"]:checked').value;
  const spinner=document.getElementById('anomaly-spinner');
  spinner.classList.add('visible');
  setTimeout(()=>{
    state.anomalyResults=detectAllKpis(state.campaignRows, method);
    state.anomalyMethodUsed=method;
    state.anomalyRenderedTabs=new Set();
    spinner.classList.remove('visible');
    renderAnomalyResults();
  },50);
}

function renderAnomalyResults() {
  const results=state.anomalyResults;
  const kpis=Object.keys(results);
  const tabBar=kpis.map((k,i)=>`<button class="kpi-tab${i===0?' active':''}" onclick="switchAnomalyTab('${k}')">${k}</button>`).join('');
  const panels=kpis.map((k,i)=>`<div class="kpi-panel${i===0?' active':''}" id="anom-panel-${k}">
    <div id="anom-chart-${k}" style="height:320px"></div>
    <div id="anom-badge-${k}"></div>
    <div id="anom-table-${k}"></div>
    <div id="anom-expanders-${k}"></div>
  </div>`).join('');
  document.getElementById('anomaly-results').innerHTML=`
    <div class="kpi-tab-bar">${tabBar}</div>${panels}`;
  if(kpis.length) renderAnomalyTab(kpis[0]);
}

function switchAnomalyTab(kpi) {
  document.querySelectorAll('#anomaly-results .kpi-tab').forEach(b=>{b.classList.toggle('active',b.textContent===kpi);});
  document.querySelectorAll('#anomaly-results .kpi-panel').forEach(p=>{p.classList.toggle('active',p.id===`anom-panel-${kpi}`);});
  if(!state.anomalyRenderedTabs.has(kpi)) renderAnomalyTab(kpi);
  else{const el=document.getElementById(`anom-chart-${kpi}`);if(el)Plotly.Plots.resize(el);}
}

function renderAnomalyTab(kpi) {
  state.anomalyRenderedTabs.add(kpi);
  const {anomalyRows, mask, scores, allRows}=state.anomalyResults[kpi];
  const normalRows=allRows.filter((_,i)=>!mask[i]);
  const anomRows=allRows.filter((_,i)=>mask[i]);
  const traceType=allRows.length>5000?'scattergl':'scatter';
  Plotly.newPlot(`anom-chart-${kpi}`,[
    {type:traceType,mode:'lines+markers',
     x:normalRows.map(r=>r._dateStr),y:normalRows.map(r=>r[kpi]),
     line:{color:'steelblue',width:1.5},marker:{color:'steelblue',size:4,opacity:0.75},name:'Normal'},
    {type:traceType,mode:'markers',
     x:anomRows.map(r=>r._dateStr),y:anomRows.map(r=>r[kpi]),
     marker:{color:'red',size:10,symbol:'circle-open',line:{color:'red',width:2.5}},name:'Anomaly'}
  ],{
    title:{text:`${kpi} — ${state.anomalyMethodUsed}`,font:{size:13}},
    xaxis:{title:'Date'},yaxis:{title:kpi},
    legend:{orientation:'h',y:-0.15},
    margin:{t:40,b:80,l:70,r:20},plot_bgcolor:'#fafbff',paper_bgcolor:'#fff'
  },{responsive:true,displayModeBar:false});

  const n=anomalyRows.length;
  const pct=(n/allRows.length*100).toFixed(1);
  document.getElementById(`anom-badge-${kpi}`).innerHTML=n>0
    ?`<div class="badge-warning">⚠️ ${n} anomalies detected (${pct}% of data points)</div>`
    :`<div class="badge-success">✅ No anomalies detected in ${kpi}</div>`;

  if(n>0){
    const sorted=anomalyRows.slice().sort((a,b)=>a._dateStr<b._dateStr?-1:1);
    document.getElementById(`anom-table-${kpi}`).innerHTML=renderTable(
      ['Date','Campaign_ID','Brand','Channel',kpi,'Anomaly Score'],
      sorted.map(r=>({'Date':r._dateStr,'Campaign_ID':r.Campaign_ID,'Brand':r.Brand,'Channel':r.Channel,[kpi]:fmtNum(r[kpi]),'Anomaly Score':fmtNum(r._anomaly_score)}))
    );
  }

  document.getElementById(`anom-expanders-${kpi}`).innerHTML=`
    <details open>
      <summary>💡 Insights (Descriptive Analytics)</summary>
      <div class="details-body">${genAnomalyInsights(anomalyRows,kpi,state.anomalyMethodUsed)}</div>
    </details>
    <details>
      <summary>🎯 Recommendations (Prescriptive Analytics)</summary>
      <div class="details-body">${genAnomalyRecommendations(anomalyRows,kpi,state.anomalyMethodUsed)}</div>
    </details>`;
}

// ============================================================
// SECTION 15: SIDEBAR STATUS + LOADED FILES
// ============================================================
function updateSidebarStatus() {
  const lf=document.getElementById('loaded-files');
  const lfList=document.getElementById('loaded-files-list');
  const items=[];
  if(state.campaignFileName) items.push(`<li>📊 ${state.campaignFileName}</li>`);
  if(state.registryFileName) items.push(`<li>📋 ${state.registryFileName}</li>`);
  if(items.length){lf.style.display='block';lfList.innerHTML=items.join('');}
  else lf.style.display='none';
  const reset=document.getElementById('reset-btn');
  reset.classList.toggle('visible',!!state.campaignRows);
  const disabled=!state.campaignRows;
  ['btn-eda','btn-correlation','btn-anomaly'].forEach(id=>{document.getElementById(id).disabled=disabled;});
}

function setStatus(id, type, msg) {
  const el=document.getElementById(id);
  el.className='status-badge '+(type==='success'?'success':'error');
  el.textContent=msg;
}

// ============================================================
// SECTION 16: NAVIGATION
// ============================================================
function renderView() {
  const view=state.activeView;
  const viewMap={'eda':renderEDA,'correlation':renderCorrelation,'anomaly':renderAnomaly};
  const labelMap={'eda':'btn-eda','correlation':'btn-correlation','anomaly':'btn-anomaly'};
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.className='nav-btn '+(b.dataset.view===view?'nav-btn-active':'nav-btn-inactive');
    b.disabled=!state.campaignRows;
  });
  if(view && viewMap[view]) viewMap[view]();
  else renderReadyCard();
}

// ============================================================
// SECTION 17: APP INIT
// ============================================================
function initApp() {
  // File input change → show upload button
  document.getElementById('campaign-file-input').addEventListener('change', e=>{
    document.getElementById('campaign-upload-btn').classList.toggle('visible', e.target.files.length>0);
    if(!e.target.files.length) document.getElementById('campaign-status').className='status-badge';
  });
  document.getElementById('registry-file-input').addEventListener('change', e=>{
    document.getElementById('registry-upload-btn').classList.toggle('visible', e.target.files.length>0);
    if(!e.target.files.length) document.getElementById('registry-status').className='status-badge';
  });

  // Upload buttons
  document.getElementById('campaign-upload-btn').addEventListener('click', async ()=>{
    const file=document.getElementById('campaign-file-input').files[0];
    if(!file) return;
    setStatus('campaign-status','','Uploading…');
    const {data,error}=await loadCampaignData(file);
    if(error){setStatus('campaign-status','error','❌ '+error);return;}
    state.campaignRows=data;
    state.campaignFileName=file.name;
    state.activeView=null;
    state.anomalyResults=null; state.anomalyMethodUsed=null; state.corrDone=false;
    setStatus('campaign-status','success','✅ Loaded '+data.length.toLocaleString()+' rows');
    updateSidebarStatus();
    renderView();
  });

  document.getElementById('registry-upload-btn').addEventListener('click', async ()=>{
    const file=document.getElementById('registry-file-input').files[0];
    if(!file) return;
    const {data,error}=await loadRegistryData(file);
    if(error){setStatus('registry-status','error','❌ '+error);return;}
    state.registryRows=data;
    state.registryFileName=file.name;
    setStatus('registry-status','success','✅ Loaded '+data.length+' campaigns');
    updateSidebarStatus();
  });

  // Nav buttons
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!state.campaignRows) return;
      state.activeView=btn.dataset.view;
      renderView();
    });
  });

  // Reset
  document.getElementById('reset-btn').addEventListener('click',()=>{
    state.campaignRows=null; state.registryRows=null;
    state.campaignFileName=null; state.registryFileName=null;
    state.activeView=null; state.anomalyResults=null; state.anomalyMethodUsed=null; state.corrDone=false;
    document.getElementById('campaign-file-input').value='';
    document.getElementById('registry-file-input').value='';
    document.getElementById('campaign-upload-btn').classList.remove('visible');
    document.getElementById('registry-upload-btn').classList.remove('visible');
    document.getElementById('campaign-status').className='status-badge';
    document.getElementById('registry-status').className='status-badge';
    updateSidebarStatus();
    renderWelcome();
  });

  renderWelcome();
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
